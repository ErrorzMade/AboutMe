<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ErrorzMade</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #f2e6ff, #e6e1f9); 
            
            display: flex;
            flex-direction: column;    
            align-items: center;       
            padding-top: 10vh;         
            min-height: 90vh;
            margin: 0;
            padding-bottom: 50px;      
        }

        .container {
            background-color: #ffffff; 
            padding: 35px 35px;        
            border-radius: 30px;       
            width: 90%;
            max-width: 490px;          
            height: fit-content;       
            border: 3px solid #dcb6f6;
            box-shadow: 0 10px 25px rgba(220, 182, 246, 0.4);
            
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .pfp {
            width: 105px;               
            height: 105px;
            border-radius: 50%;
            border: 3px solid #dcb6f6;
            margin-bottom: 12px;       
            object-fit: cover; 
        }

        h1 { 
            font-size: 1.9rem;
            font-weight: 800;          
            margin: 0;
            color: #5d4a66;            
        }

        .pronouns {
            color: #c98cd4;            
            font-size: 0.95rem;
            font-weight: bold;
            margin-top: 4px;
            margin-bottom: 15px;       
        }

        p {
            line-height: 1.6;
            color: #8c7b96;            
            margin: 0;
            font-size: 1rem;
            font-weight: 500;
        }

        
        .socials-container {
            margin-top: 25px;          
            display: grid;                         
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px;                 
            width: 90%;
            max-width: 490px;          
        }

        .social-btn {
            background-color: #ffffff;
            color: #5d4a66;            
            text-decoration: none;     
            padding: 12px 20px;        
            border-radius: 25px;       
            font-size: 0.95rem;
            font-weight: bold;
            border: 2px solid #dcb6f6; 
            box-shadow: 0 5px 15px rgba(220, 182, 246, 0.3);
            transition: all 0.3s ease; 
            
            display: flex;
            justify-content: center;   
            align-items: center;
            width: 100%;               
        }

        .social-btn:hover {
            transform: translateY(-4px); 
            background-color: #f6edfc;   
            box-shadow: 0 8px 20px rgba(220, 182, 246, 0.5);
            border-color: #c98cd4;       
            color: #a46db5; 
        }

        .discord-box {
            background-color: #ffffff; 
            color: #5d4a66;            
            padding: 12px 20px;        
            border-radius: 25px;       
            font-size: 0.95rem;
            font-weight: bold;
            border: 2px solid #dcb6f6; 
            box-shadow: 0 5px 15px rgba(220, 182, 246, 0.3); 
            
            display: flex;
            justify-content: center;   
            align-items: center;
            width: 100%; 
            cursor: default;           
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="images/pfp.jpg" alt="Profile Picture" class="pfp">
        
        <h1>ErrorzMade</h1>
        <div class="pronouns">(any/all)</div>
        <p>GHD Commissioner & Mediocre Block Slicer!</p>
    </div>

    <div class="socials-container">
        <a href="https://x.com/ErrorzMadez" target="_blank" class="social-btn">Twitter</a>
        <div class="discord-box">Discord: errorz.</div>
        <a href="https://www.tiktok.com/@errorzmade" target="_blank" class="social-btn">TikTok</a>
        <a href="https://github.com/ErrorzMade" target="_blank" class="social-btn">GitHub</a>
        <a href="https://www.twitch.tv/errorismade" target="_blank" class="social-btn">Twitch</a>
        <a href="https://www.youtube.com/@Errorz_" target="_blank" class="social-btn">YouTube</a>
    </div>

</body>
</html>
